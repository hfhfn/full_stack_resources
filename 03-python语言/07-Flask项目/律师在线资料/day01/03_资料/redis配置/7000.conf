bind 127.0.0.1
port 7000
pidfile /var/run/redis_7000.pid
logfile "/home/python/redis/log/redis_7000.log"
dir "/home/python/redis/lib/7000"
daemonize yes
appendonly yes
cluster-enabled yes 
cluster-config-file nodes-7000.conf 
cluster-node-timeout 10000 
maxmemory 300000000 
maxmemory-policy volatile-lru



