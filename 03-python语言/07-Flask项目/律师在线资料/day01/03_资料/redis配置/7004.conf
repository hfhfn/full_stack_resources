bind 127.0.0.1
port 7004
pidfile /var/run/redis_7004.pid
logfile "/home/python/redis/log/redis_7004.log"
dir "/home/python/redis/lib/7004"
daemonize yes
appendonly yes
cluster-enabled yes 
cluster-config-file nodes-7004.conf 
cluster-node-timeout 10000 
maxmemory 300000000 
maxmemory-policy volatile-lru



