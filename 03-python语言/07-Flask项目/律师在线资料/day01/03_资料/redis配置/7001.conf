bind 127.0.0.1
port 7001
pidfile /var/run/redis_7001.pid
logfile "/home/python/redis/log/redis_7001.log"
dir "/home/python/redis/lib/7001"
daemonize yes
appendonly yes
cluster-enabled yes 
cluster-config-file nodes-7001.conf 
cluster-node-timeout 10000 
maxmemory 300000000 
maxmemory-policy volatile-lru



