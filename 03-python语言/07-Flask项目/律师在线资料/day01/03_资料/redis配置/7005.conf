bind 127.0.0.1
port 7005
pidfile /var/run/redis_7005.pid
logfile "/home/python/redis/log/redis_7005.log"
dir "/home/python/redis/lib/7005"
daemonize yes
appendonly yes
cluster-enabled yes 
cluster-config-file nodes-7005.conf 
cluster-node-timeout 10000 
maxmemory 300000000 
maxmemory-policy volatile-lru



