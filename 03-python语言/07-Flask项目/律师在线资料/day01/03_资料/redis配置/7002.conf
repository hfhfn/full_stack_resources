bind 127.0.0.1
port 7002
pidfile /var/run/redis_7002.pid
logfile "/home/python/redis/log/redis_7002.log"
dir "/home/python/redis/lib/7002"
daemonize yes
appendonly yes
cluster-enabled yes 
cluster-config-file nodes-7002.conf 
cluster-node-timeout 10000 
maxmemory 300000000 
maxmemory-policy volatile-lru



