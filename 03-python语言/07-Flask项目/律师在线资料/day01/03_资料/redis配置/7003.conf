bind 127.0.0.1
port 7003
pidfile /var/run/redis_7003.pid
logfile "/home/python/redis/log/redis_7003.log"
dir "/home/python/redis/lib/7003"
daemonize yes
appendonly yes
cluster-enabled yes 
cluster-config-file nodes-7003.conf 
cluster-node-timeout 10000 
maxmemory 300000000 
maxmemory-policy volatile-lru



