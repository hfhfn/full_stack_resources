name: Distribute Large Files

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - ".gitignore"
      - "index.html"
      - "data/file_manifest.json"

jobs:
  distribute:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: pip install huggingface_hub

      - name: Run Distribution Script
        env:
          HUGGING_FACE_HUB_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/distribute_files.py

      - name: Commit and Push Manifest & .gitignore
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/file_manifest.json .gitignore
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto: Update manifest and gitignore [skip ci]" && git push)
