<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>full_stack_resources - Files</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        max-width: 900px;
        margin: 0 auto;
        padding: 20px;
        background-color: #f8fafc;
        color: #334155;
      }
      h1 {
        color: #1e293b;
        border-bottom: 2px solid #e2e8f0;
        padding-bottom: 10px;
      }
      .file-item {
        display: flex;
        align-items: center;
        padding: 10px 15px;
        border-bottom: 1px solid #e2e8f0;
        background: white;
        transition: background 0.2s;
      }
      .file-item:hover {
        background-color: #f1f5f9;
      }
      .file-item a {
        text-decoration: none;
        color: #2563eb;
        font-weight: 500;
        display: flex;
        align-items: center;
        width: 100%;
      }
      .file-icon {
        margin-right: 10px;
        font-size: 1.2em;
      }
      .hf-badge {
        margin-left: auto;
        font-size: 11px;
        background-color: #fef3c7;
        color: #92400e;
        padding: 2px 8px;
        border-radius: 12px;
        font-weight: bold;
        border: 1px solid #fcd34d;
      }
      .folder {
        margin-top: 5px;
      }
      .folder-header {
        font-weight: bold;
        padding: 8px 12px;
        cursor: pointer;
        background-color: #e2e8f0;
        border-radius: 6px;
        display: flex;
        align-items: center;
        color: #475569;
      }
      .folder-header:hover {
        background-color: #cbd5e1;
      }
      .folder-children {
        margin-left: 20px;
        border-left: 2px solid #e2e8f0;
      }
      .loading,
      .error,
      .no-results {
        text-align: center;
        padding: 40px;
        color: #64748b;
      }
      .error {
        color: #ef4444;
      }
    </style>
  </head>
  <body>
    <h1>📂 full_stack_resources Files</h1>
    <div id="file-list"></div>

    <script>
      // --- CONFIGURATION ---
      const username = "hfhfn"; // Agent: Replace!
      const repo = "full_stack_resources"; // Agent: Replace!
      const branch = "main";

      let allFilesData = [];

      function buildFileTree(files) {
        const tree = {};
        files.forEach((file) => {
          const parts = file.path.split("/");
          let current = tree;
          const fileName = parts.pop();
          parts.forEach((dir) => {
            if (!current[dir]) current[dir] = {};
            current = current[dir];
          });
          if (!current._files) current._files = [];
          current._files.push({
            name: fileName,
            fullPath: file.path,
            ext: fileName.split(".").pop().toLowerCase(),
            isHF: file.isHF,
            hfInfo: file.hfInfo,
          });
        });
        return tree;
      }

      function renderTree(node) {
        let html = "";
        // Render Folders
        Object.keys(node)
          .filter((k) => k !== "_files")
          .sort()
          .forEach((folder) => {
            html += `<div class="folder"><div class="folder-header">📁 ${folder}/</div><div class="folder-children">${renderTree(node[folder])}</div></div>`;
          });
        // Render Files
        if (node._files) {
          node._files
            .sort((a, b) => a.name.localeCompare(b.name))
            .forEach((file) => {
              let url,
                title,
                badge = "";
              const previewExts = [
                "pdf",
                "jpg",
                "jpeg",
                "png",
                "gif",
                "svg",
                "txt",
                "json",
                "html",
                "htm",
                "xml",
              ];

              if (file.isHF) {
                url = file.hfInfo.url;
                title = `HuggingFace Download (${file.hfInfo.size_mb}MB)`;
                badge = '<span class="hf-badge">🤗 HF</span>';
              } else if (previewExts.includes(file.ext)) {
                url = file.fullPath; // Direct preview relative path
                title = "Direct View/Download";
              } else {
                url = `https://github.com/${username}/${repo}/blob/${branch}/${file.fullPath}`; // Blob view
                title = "View Source on GitHub";
              }
              html += `<div class="file-item"><a href="${url}" target="_blank"><span class="file-icon">📄</span><span>${file.name}</span>${badge}</a></div>`;
            });
        }
        return html;
      }

      async function init() {
        try {
          document.getElementById("file-list").innerHTML =
            '<div class="loading">Loading files...</div>';

          // 1. Fetch GitHub Tree
          const ghRes = await fetch(
            `https://api.github.com/repos/${username}/${repo}/git/trees/${branch}?recursive=1`,
          );
          const ghData = ghRes.ok ? await ghRes.json() : { tree: [] };

          // Filter files (exclude .git, scripts, data)
          const gitFiles = (ghData.tree || []).filter(
            (i) =>
              i.type === "blob" &&
              !i.path.startsWith(".git") &&
              !i.path.startsWith("scripts/") &&
              !i.path.startsWith("data/"),
          );

          allFilesData = gitFiles.map((f) => ({
            path: f.path,
            name: f.path.split("/").pop(),
            isHF: false,
          }));

          // 2. Fetch HF Manifest
          try {
            const hfRes = await fetch(
              "./data/file_manifest.json?t=" + Date.now(),
            );
            if (hfRes.ok) {
              const hfData = await hfRes.json();
              hfData.files.forEach((f) => {
                allFilesData.push({
                  path: f.path,
                  name: f.name,
                  isHF: true,
                  hfInfo: f,
                });
              });
            }
          } catch (e) {
            console.warn("Manifest loading failed", e);
          }

          // Render
          if (allFilesData.length === 0) {
            document.getElementById("file-list").innerHTML =
              '<div class="no-results">No files found.</div>';
          } else {
            document.getElementById("file-list").innerHTML = renderTree(
              buildFileTree(allFilesData),
            );
          }
        } catch (e) {
          document.getElementById("file-list").innerHTML =
            `<div class="error">Error loading files: ${e.message}</div>`;
        }
      }
      init();
    </script>
  </body>
</html>
